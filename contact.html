<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Contact Me</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <h1>Contact Me</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html" class="active">Contact</a>
            <a href="home.html">About the Tool</a>
        </nav>
    </header>

    <section id="contact" class="contact-section">
        <h2>Contact Me</h2>
        <div class="contact-icons">
            <a href="https://www.facebook.com/share/1AqtFivMjT" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.linkedin.com/in/saba-hameed-a75433230/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:sabahameednoor@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
        <div class="contact-form">
            <form action="mailto:sabahameednoor@gmail.com" method="post" enctype="text/plain">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <input type="text" name="query" placeholder="Your Query" required>
                <textarea name="message" placeholder="Your Message" required></textarea>
                <button type="submit" class="cta-button">Send Message</button>
            </form>
        </div>
    </section>
